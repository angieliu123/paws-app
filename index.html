<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAWS App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-frame">
        <header class="header">
            <div class="search-bar">Please enter</div>
            <div class="icons">🔔 ⚙️</div>
        </header>

        <main class="main-content">
            <div class="card mood-card">
                <h3>How are you feeling today?</h3>
                <div class="emoji-row">
                    <span>😊</span><span>🙂</span><span>😐</span><span>😢</span><span>😡</span>
                </div>
            </div>

            <div class="card input-card">
                <textarea placeholder="Leave something behind!"></textarea>
                <button class="send-btn">Send ✈️</button>
            </div>
        </main>

        <nav class="nav-bar">
            <span>🏠</span><span>📅</span><span class="center-dog">🐶</span><span>🪐</span><span>👤</span>
        </nav>
    </div>
</body>
</html>
